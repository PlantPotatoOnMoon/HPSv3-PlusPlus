# HPSv3++ Stage 1: Orthogonal Gradient Descent (OGD) continual learning (open-source version, relative paths)
# Goal: extend the reward model from HPSv3 to the frontier generative-model distribution (the aes/pf
# train split of HPDv3++), while using the original HPDv3 training data as reference and orthogonal
# gradient projection to prevent catastrophic forgetting.
# The resulting checkpoint serves as the initialization for Stage 2 (see load_from_pretrained in train_stage2.yaml).

# === Model ===
rm_head_type: "ranknet"
lora_enable: False
vision_lora: False
freeze_vision_tower: False
freeze_llm: False
tune_merger: True
model_name_or_path: "Qwen/Qwen3-VL-8B-Instruct"
num_lora_modules: -1
lora_r: 512
lora_alpha: 1024
lora_namespan_exclude: ["lm_head", "rm_head", "embed_tokens"]

# === Data (open-source CSV entry, relative to data_root) ===
data_root: "datasets"
# Stage 1 labeled training data (the merged aes + pf train split of HPDv3++)
train_json: "datasets/train/stage1_labeled.json"
# OGD reference data (the original HPDv3 training set, for anti-forgetting)
ref_json: "datasets/train/stage1_ref.json"
test_json_list:
  - ["Aesthetic (clean)", "datasets/test/test_aes.json"]
  - ["PromptFollow (clean)", "datasets/test/test_tf.json"]

confidence_threshold: null
tied_threshold: null
max_pixels: 200704
min_pixels: 200704
with_instruction: true
soft_label: False
output_dir: output_models
use_special_tokens: true
reward_token: "special"
output_dim: 2
loss_type: "uncertainty"

# === Initialization checkpoint ===
# The AES reward-model weights of HPSv3 8B Qwen3-VL trained on HPDv3 (Stage 0).
# Open-source users must prepare this checkpoint themselves (or obtain it from the official HPSv3
# release) and fill in the local path and step.
load_from_pretrained: null
load_from_pretrained_step: null

# === OGD hyperparameters ===
ref_batch_size: 2
ref_confidence_threshold: 0.95

# === Training parameters (small learning rate for continual learning) ===
disable_flash_attn2: False
per_device_train_batch_size: 2
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
num_train_epochs: 1   # the released checkpoint is taken from epoch 1 (the original run set 10 epochs; we use epoch 1)
learning_rate: 5.0e-7
special_token_lr: 5.0e-7
warmup_ratio: 0.05
lr_scheduler_type: "constant_with_warmup"
gradient_checkpointing: True
gradient_checkpointing_kwargs: {"use_reentrant": False}

# === Evaluation / logging ===
eval_strategy: "steps"
logging_epochs: 0.01
eval_epochs: 0.25
save_epochs: 0.5
report_to: none

# === System ===
bf16: True
torch_dtype: "bfloat16"
deepspeed: hpsv3/config/ds_config/zero2.json
save_only_model: True
save_full_model: True
dataloader_num_workers: 2
